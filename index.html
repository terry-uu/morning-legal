<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="눈을 뜨면 누군가의 인사가 기다려요. 그 온기로 당신도 또 다른 누군가의 아침을 엽니다. 아침인사회." />
  <meta property="og:title" content="아침인사회" />
  <meta property="og:description" content="눈을 뜨면 누군가의 인사가 기다려요. 그 온기로 당신도 또 다른 누군가의 아침을 엽니다." />
  <title>아침인사회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --bg0: #05060a;
      --bg1: #0b0d13;
      --ink: #f2efe8;
      --ink-soft: #b9bdd4;
      --ink-faint: #7e84a6;
      --accent: #9fd356;
      --line: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(1200px 700px at 70% -10%, rgba(159, 211, 86, 0.12), transparent 55%),
        radial-gradient(900px 500px at 10% 30%, rgba(90, 110, 180, 0.10), transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 48%, #080a10);
      line-height: 1.7;
    }
    a { color: var(--ink); text-underline-offset: 0.28em; }
    a:hover { color: var(--accent); }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* —— Hero —— */
    .hero {
      min-height: 100svh;
      display: grid;
      align-content: center;
      gap: 1.75rem;
      padding: 12vh 0 8vh;
      max-width: 40rem;
    }
    .logo {
      display: block;
      width: min(220px, 58vw);
      height: calc(min(220px, 58vw) * 695 / 1612);
      background-color: var(--accent);
      -webkit-mask: url("assets/morning-logo.png") center / contain no-repeat;
      mask: url("assets/morning-logo.png") center / contain no-repeat;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(1.85rem, 5.6vw, 3.15rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.28;
      word-break: keep-all;
    }
    .hero h1 .welcome {
      display: block;
      margin-top: 0.55em;
      font-weight: 600;
      color: var(--ink-soft);
      font-size: 0.72em;
      letter-spacing: -0.02em;
    }
    .hero .lede {
      margin: 0;
      max-width: 28rem;
      font-size: clamp(1.02rem, 2.4vw, 1.18rem);
      color: var(--ink-soft);
      word-break: keep-all;
    }
    .hero nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.4rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--line);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* —— Phones —— */
    .phones {
      padding: 2rem 0 1rem;
    }
    .phones-track {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.25rem;
      align-items: end;
    }
    .phone {
      margin: 0;
      border: 0;
      background: transparent;
    }
    .phone figcaption {
      margin: 0.85rem 0 0;
      text-align: center;
      font-size: 0.86rem;
      color: var(--ink-faint);
      letter-spacing: -0.01em;
    }
    .device {
      position: relative;
      border-radius: 2rem;
      padding: 0.55rem;
      background: linear-gradient(160deg, #1a1d27, #0a0b10 70%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 28px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }
    .device::before {
      content: "";
      position: absolute;
      top: 0.7rem;
      left: 50%;
      transform: translateX(-50%);
      width: 28%;
      height: 0.72rem;
      border-radius: 999px;
      background: #05060a;
      z-index: 2;
    }
    .device img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 1.55rem;
    }
    .phone:nth-child(2) { transform: translateY(-1.25rem); }
    .phone:nth-child(1),
    .phone:nth-child(3) { opacity: 0.92; }

    footer {
      margin-top: 4.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      font-size: 0.82rem;
      color: var(--ink-faint);
      word-break: keep-all;
    }
    footer a { color: inherit; }

    @media (max-width: 860px) {
      .phones-track {
        grid-template-columns: 1fr;
        max-width: 300px;
        margin: 0 auto;
        gap: 2rem;
      }
      .phone:nth-child(2) { transform: none; }
      .phone:nth-child(1),
      .phone:nth-child(3) { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <span class="logo" role="img" aria-label="아침인사회"></span>
      <h1>
        애정 가득한 마음으로 하루를 시작합니다
        <span class="welcome">어서오세요. 아침인사회.</span>
      </h1>
      <p class="lede">
        눈을 뜨면 누군가의 인사가 기다려요.<br />
        그 온기로, 당신도 아직 깨지 않은 누군가의 아침을 엽니다.
      </p>
      <nav aria-label="서비스 안내">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">이용약관</a>
        <a href="mailto:terry.youu@gmail.com">문의하기</a>
      </nav>
    </header>

    <section class="phones" aria-label="앱 미리보기">
      <div class="phones-track">
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/morning.png" width="402" height="874" alt="아침 화면 — 받은 인사와 건네기" />
          </div>
          <figcaption>받는 아침</figcaption>
        </figure>
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/records.png" width="402" height="874" alt="기록 화면 — 받은 인사와 보낸 인사" />
          </div>
          <figcaption>쌓이는 기록</figcaption>
        </figure>
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/me.png" width="402" height="874" alt="마이 화면 — 기상 알람과 초대" />
          </div>
          <figcaption>나의 아침</figcaption>
        </figure>
      </div>
    </section>

    <footer>
      비로소 · 대표 유태형 · 사업자등록번호 610-29-65664<br />
      서울특별시 성동구 뚝섬로 413-1 · <a href="mailto:terry.youu@gmail.com">terry.youu@gmail.com</a>
    </footer>
  </div>
</body>
</html>
