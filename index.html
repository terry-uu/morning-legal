<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="애정 가득한 마음으로 하루를 시작합니다. 어서오세요. 아침인사회." />
  <meta property="og:title" content="아침인사회" />
  <meta property="og:description" content="애정 가득한 마음으로 하루를 시작합니다. 어서오세요. 아침인사회." />
  <title>아침인사회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --bg0: #05060a;
      --bg1: #0b0d13;
      --ink: #f2efe8;
      --ink-soft: #b9bdd4;
      --ink-faint: #7e84a6;
      --accent: #9fd356;
      --line: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(1200px 700px at 70% -10%, rgba(159, 211, 86, 0.12), transparent 55%),
        radial-gradient(900px 500px at 10% 30%, rgba(90, 110, 180, 0.10), transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 48%, #080a10);
      line-height: 1.65;
    }
    a { color: var(--ink); text-underline-offset: 0.28em; }
    a:hover { color: var(--accent); }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .top {
      padding: 7vh 0 2.5rem;
      display: grid;
      gap: 1.15rem;
      max-width: 36rem;
    }
    .logo {
      display: block;
      width: min(118px, 34vw);
      height: calc(min(118px, 34vw) * 695 / 1612);
      background-color: var(--accent);
      -webkit-mask: url("assets/morning-logo.png") center / contain no-repeat;
      mask: url("assets/morning-logo.png") center / contain no-repeat;
    }
    .copy {
      margin: 0;
      font-size: clamp(0.98rem, 2.2vw, 1.12rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.55;
      color: var(--ink);
      word-break: keep-all;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem 1.2rem;
      font-size: 0.88rem;
      color: var(--ink-faint);
    }
    .links a { color: inherit; }

    .phones {
      padding: 0.5rem 0 1rem;
    }
    .phones-track {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.1rem;
      align-items: start;
    }
    .phone {
      margin: 0;
      border: 0;
      background: transparent;
    }
    .device {
      position: relative;
      border-radius: 2rem;
      padding: 0.5rem;
      background: linear-gradient(160deg, #1a1d27, #0a0b10 70%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 24px 50px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }
    .device img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 1.5rem;
    }

    footer {
      margin-top: 3.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
      font-size: 0.78rem;
      color: var(--ink-faint);
      word-break: keep-all;
    }
    footer a { color: inherit; }

    @media (max-width: 860px) {
      .phones {
        margin-inline: -1.5rem;
      }
      .phones-track {
        display: flex;
        gap: 1rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        padding: 0.25rem 1.5rem 1rem;
        scrollbar-width: none;
      }
      .phones-track::-webkit-scrollbar { display: none; }
      .phone {
        flex: 0 0 min(72vw, 280px);
        scroll-snap-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <span class="logo" role="img" aria-label="아침인사회"></span>
      <p class="copy">
        애정 가득한 마음으로 하루를 시작합니다<br />
        어서오세요. 아침인사회.
      </p>
      <nav class="links" aria-label="서비스 안내">
        <a href="/privacy">개인정보처리방침</a>
        <a href="/terms">이용약관</a>
        <a href="mailto:terry.youu@gmail.com">문의하기</a>
      </nav>
    </header>

    <section class="phones" aria-label="앱 미리보기">
      <div class="phones-track">
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/morning.png" width="402" height="874" alt="아침 화면" />
          </div>
        </figure>
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/records.png" width="402" height="874" alt="기록 화면" />
          </div>
        </figure>
        <figure class="phone">
          <div class="device">
            <img src="assets/shots/me.png" width="402" height="874" alt="마이 화면" />
          </div>
        </figure>
      </div>
    </section>

    <footer>
      비로소 · 대표 유태형 · 사업자등록번호 610-29-65664<br />
    서울특별시 성동구 뚝섬로 413-1 · 02-466-3193 · terry.youu@gmail.com
    </footer>
  </div>
</body>
</html>
